    <style cmd="base64">
        
        :root {
            --bee-player-card: #d84265;
        }
        
        .offcanvas-header {
            background-color: #d84265 !important;
        }
        
        
        
        
        fieldset {
            padding: 10px 10px 10px 10px;
            border: 2px solid rgba(255,255,255,0.7);
            margin-bottom: 25px;
            border-radius: 5px;
        }
        
        fieldset > legend {
            float:  none;
            width: auto;
            padding: 0px 10px 0px 10px;
            font-size: 120%;
        }
        
        .note {
            margin: 0px 0px 10px 0px;
            background: rgba(0,200,0,0.15);
            padding: 3px 5px 3px 5px;
            border:  1px solid rgba(0,200,0,0.4);
            border-radius: 5px;
        }
        
        
        .iframe-container {
            position: relative;
            width: 100%;
            
            height: 0;
            overflow: hidden;
             
            padding-bottom: 56.25%; /* 16:9 aspect ratio (9 / 16 = 0.5625) */
            border: 1px solid gray; 
            border-radius: 10px; 
             
            box-shadow: 0px 0px 5px rgba(255,255,255,0.5);
        }

        .iframe-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }
        
        
    </style>
