<?xml version="1.0" encoding="UTF-8"?>
<div>

    <link href="https://vjs.zencdn.net/8.16.1/video-js.css" rel="stylesheet" />
    
    
    <style cmd="base64">
        fieldset {
            padding: 10px 10px 10px 10px;
            border: 2px solid rgba(255,255,255,0.7);
            margin-bottom: 25px;
            border-radius: 5px;
        }
        
        fieldset > legend {
            float:  none;
            width: auto;
            padding: 0px 10px 0px 10px;
            font-size: 120%;
        }
        
        .note {
            margin: 0px 0px 10px 0px;
            background: rgba(0,200,0,0.15);
            padding: 3px 5px 3px 5px;
            border:  1px solid rgba(0,200,0,0.4);
            border-radius: 5px;
        }
        
        
        .iframe-container {
            position: relative;
            width: 100%;
            
            height: 0;
            overflow: hidden;
             
            padding-bottom: 56.25%; /* 16:9 aspect ratio (9 / 16 = 0.5625) */
            border: 1px solid gray; 
            border-radius: 10px; 
             
            box-shadow: 0px 0px 5px rgba(255,255,255,0.5);
        }

        .iframe-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }
        
        
    </style>


    
    <setting node="menu_breadcrumb">
        <item1>
            <link>/</link>
            <label>Home</label>
        </item1>
        
         <item2>
            <link>/</link>
            <label>Tailscale VPN</label>
        </item2>
        
    </setting>

    <component source="/component/breadcrumb" />
    <component source="/component/logged_user" />

    
    <div class="container">

        
        <div style="min-height: 25px" />
        <component source="/component/monitor/tailscale" />

        

        
       
  
        
        <component source="/obsah/fragment" />

    </div>



    
    <script cmd="base64">
        page.menu.addMenu("Home",  "/", "/assets/svg/person.svg", "--bee-player-card");

        
        
    </script>

</div>
