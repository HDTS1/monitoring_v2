<?xml version="1.0" encoding="UTF-8"?>
<root>
        <title>{{title}}</title>
     

        <meta name="title" content="{{title}}"/>
        <meta name="description" content="{{description}}" />
        <meta name="keywords" content="{{keywords}}" />
        
        <meta property="og:url" content="{{protokol}}://{{server}}{{url}}" />
        <meta property="og:title" content="{{title}}" />
        <meta property="og:description" content="{{description}}"/>
        <meta property="og:image" content="{{foto_path}}"/>
        <meta property="og:image:secure" content="{{foto_path}}"/>
        <meta property="og:image:secure_url" content="{{foto_path}}"/>

        <meta property="og:type" content="website"/>    
        <meta property="og:image:alt" content="{{title}}"/> 

        
        <!-- Twitter Meta Tags -->

        <meta name="twitter:card" content="summary_large_image"/>
        <meta property="twitter:domain" content="{{server}}"/>
        <meta property="twitter:url" content="{{protokol}}://{{server}}{{url}}"/>
        <meta name="twitter:title" content="{{title}}"  />
        <meta name="twitter:description" content="{{description}}" />
        <meta name="twitter:image" content="{{foto_path}}"/>


        
</root>
