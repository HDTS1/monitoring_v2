<?xml version="1.0" encoding="UTF-8"?>
<div>

    <div>
        
        
        
        <style cmd="base64">
            div.item-plc {
                display:  grid;
                grid-template-columns: 40px 1fr;
                background:  rgba(255,255,255,0.1);
                padding: 3px 5px 3px 5px;
                margin: 1px 0px 3px 0px;
                cursor: pointer;
            }
            
            div.item-plc > div:first-child {
                opacity: 0.1;
            }
            
            div.item-plc[favorite='1'] > div:first-child {
                color:  darkorange;
                opacity: 1;
            }
            
            div.item-plc:hover {
                background:  rgba(0,180,0,0.3);
            }
            
        </style>
        
        
        <div item="zaznam"></div>
    </div>
    

    
    
</div>
