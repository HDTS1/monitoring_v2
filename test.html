<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video.js s HLS podporou</title>
    <!-- CSS pre Video.js -->
    <link href="https://vjs.zencdn.net/7.18.1/video-js.css" rel="stylesheet" />
</head>
<body>

    <!-- Video.js prehrávač -->
    <video
        id="my-video"
        class="video-js vjs-default-skin"
        controls
        preload="auto"
        width="640"
        height="264"
        data-setup="{}">
        <source src="https://streaming.48toj6g9v0y978cdn.com:5443/live/streams/C.CA.KIN.DOHLAD.m3u8" type="application/x-mpegURL" />
        <p>Váš prehliadač nepodporuje prehrávanie HLS videa.</p>
    </video>

    <!-- JavaScript pre Video.js -->
    <script src="https://vjs.zencdn.net/7.18.1/video.min.js"></script>
    <!-- Pridanie HLS.js -->
    <script src="https://cdn.jsdelivr.net/npm/videojs-contrib-hls@5.15.0/dist/videojs-contrib-hls.min.js"></script>

    <script>
        // Inicializácia prehrávača
      
        
        var player = videojs('my-video', {
            autoplay: 'play', // alebo 'true' alebo 'play'
            controls: true,
            preload: 'auto'
        });
        
    </script>

</body>
</html>
